          ):
              check(f"summary.{key}", go["summary"][key], py["summary"][key])
          check("series keys", sorted(go["series"].keys()), sorted(py["series"].keys()))
          check("tables keys", sorted(go["tables"].keys()), sorted(py["tables"].keys()))
          go_codes = sorted(f["code"] for f in go["metadata"]["findings"])
          py_codes = sorted(f["code"] for f in py["metadata"]["findings"])
          check("metadata.findings (codes)", go_codes, py_codes)
          print("OK — Go and Python agree on the multi-thread fixture.")
          PY

      - name: Run lock-contention parity check
        working-directory: apps/engine-native
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/parity
          ./bin/archscope-engine thread-dump analyze-locks \
            --in ../../examples/thread-dumps/sample-java-thread-dump.txt \
            --out /tmp/parity/locks-go.json
          python -m archscope_engine.cli thread-dump analyze-locks \
            --input ../../examples/thread-dumps/sample-java-thread-dump.txt \
            --out /tmp/parity/locks-py.json
          python <<'PY'
          import json
          go = json.load(open("/tmp/parity/locks-go.json"))
          py = json.load(open("/tmp/parity/locks-py.json"))
          def check(label, a, b):
              if a != b:
                  raise SystemExit(f"parity drift on {label}: go={a!r} py={b!r}")
          check("type", go["type"], py["type"])
          check("metadata.parser", go["metadata"]["parser"], py["metadata"]["parser"])
          for key in (
              "total_dumps", "total_thread_snapshots",
              "threads_with_locks", "threads_waiting_on_lock",
              "unique_locks", "contended_locks", "deadlocks_detected",
          ):
              check(f"summary.{key}", go["summary"][key], py["summary"][key])
          check("series keys", sorted(go["series"].keys()), sorted(py["series"].keys()))
          check("tables keys", sorted(go["tables"].keys()), sorted(py["tables"].keys()))
          go_codes = sorted(f["code"] for f in go["metadata"]["findings"])
          py_codes = sorted(f["code"] for f in py["metadata"]["findings"])
          check("metadata.findings (codes)", go_codes, py_codes)
          print("OK — Go and Python agree on the lock-contention fixture.")
          PY

      - name: Run thread-dump-collapsed parity check
        working-directory: apps/engine-native
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/parity
          # Go side emits the stack -> count map as JSON; Python side
          # writes the FlameGraph "<stack> <count>" text format. We
          # convert both to the same {stack: count} shape and compare.
          ./bin/archscope-engine thread-dump to-collapsed \
            --in ../../examples/thread-dumps/sample-java-thread-dump.txt \
            --out /tmp/parity/collapsed-go.json
          python -m archscope_engine.cli thread-dump to-collapsed \
            --input ../../examples/thread-dumps/sample-java-thread-dump.txt \
            --output /tmp/parity/collapsed-py.txt
          python <<'PY'
          import json
          go = json.load(open("/tmp/parity/collapsed-go.json"))
          py = {}
          for line in open("/tmp/parity/collapsed-py.txt"):
              line = line.rstrip("\n")
              if not line:
                  continue
              # FlameGraph format: `<stack> <count>` — split on the LAST
              # whitespace so stack frames containing spaces stay intact.
              stack, _, count = line.rpartition(" ")
              py[stack] = int(count)
          if go != py:
              extra_go = {k: v for k, v in go.items() if py.get(k) != v}
              extra_py = {k: v for k, v in py.items() if go.get(k) != v}
              raise SystemExit(
                  f"parity drift on collapsed: go-only={extra_go} py-only={extra_py}"
              )
          print("OK — Go and Python agree on the thread-dump-collapsed fixture.")
          PY

  package:
    name: wails3 package (${{ matrix.os }})
    needs: go-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: darwin-arm64
            artifact: archscope-profiler-darwin-arm64
            artifact-glob: |
              apps/profiler-native/cmd/archscope-profiler-app/bin/archscope-profiler
              apps/profiler-native/cmd/archscope-profiler-app/bin/archscope-profiler.app/**
          - os: macos-13
            label: darwin-amd64
            artifact: archscope-profiler-darwin-amd64
            artifact-glob: |
              apps/profiler-native/cmd/archscope-profiler-app/bin/archscope-profiler
              apps/profiler-native/cmd/archscope-profiler-app/bin/archscope-profiler.app/**
          - os: windows-latest
            label: windows-amd64
            artifact: archscope-profiler-windows-amd64
            artifact-glob: |
              apps/profiler-native/cmd/archscope-profiler-app/bin/*.exe
          - os: ubuntu-latest
            label: linux-amd64
            artifact: archscope-profiler-linux-amd64
            artifact-glob: |
              apps/profiler-native/cmd/archscope-profiler-app/bin/*
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: apps/profiler-native/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.84

      - name: Linux WebKitGTK runtime headers
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Task runner (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -d -b /usr/local/bin

      - name: Install Task runner (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install go-task --no-progress -y

      - name: Frontend deps
        run: npm install
        working-directory: apps/profiler-native/cmd/archscope-profiler-app/frontend

      - name: Wails package
        run: task package
        working-directory: apps/profiler-native/cmd/archscope-profiler-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn
