          py = json.load(open("/tmp/parity/multi-py.json"))
          def check(label, a, b):
              if a != b:
                  raise SystemExit(f"parity drift on {label}: go={a!r} py={b!r}")
          check("type", go["type"], py["type"])
          check("metadata.parser", go["metadata"]["parser"], py["metadata"]["parser"])
          for key in (
              "total_dumps", "unique_threads", "total_thread_observations",
              "long_running_threads", "persistent_blocked_threads",
