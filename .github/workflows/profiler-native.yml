          # future divergence surfaces.
          go_codes = sorted(f["code"] for f in go["metadata"].get("findings", []))
          py_codes = sorted(f["code"] for f in py["metadata"].get("findings", []))
          check("metadata.findings (codes)", go_codes, py_codes)
          print("OK — Go and Python agree on the jfr fixture.")
