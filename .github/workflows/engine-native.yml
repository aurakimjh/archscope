name: Engine Native (Go + Wails)

on:
  pull_request:
    paths:
      - "apps/engine-native/**"
      - "examples/**"
      - ".github/workflows/engine-native.yml"
  push:
    branches:
      - main
    paths:
      - "apps/engine-native/**"
      - "examples/**"
      - ".github/workflows/engine-native.yml"

defaults:
  run:
    working-directory: apps/engine-native

jobs:
  go:
    name: Go test/build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: apps/engine-native/go.sum

      - name: Linux WebKitGTK headers
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./cmd/archscope-engine ./cmd/archscope-app

      - name: go test
        run: go test ./... -race -count=1

  wails-frontend:
    name: Wails frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine-native/cmd/archscope-app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/engine-native/cmd/archscope-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
