name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    name: Python Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engines/python
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install engine
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: python -m ruff check .
      - name: Run tests
        run: python -m pytest tests --cov=archscope_engine --cov-report=term-missing
      - name: Run core benchmarks
        run: python benchmarks/core_benchmark.py --rows 10000 --repeat 3 --json > benchmark-results.json
      - name: Publish benchmark summary
        run: |
          python benchmarks/ci_benchmark_report.py \
            --input benchmark-results.json \
            --summary-out benchmark-summary.md
          cat benchmark-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-core-benchmarks
          path: |
            engines/python/benchmark-results.json
            engines/python/benchmark-summary.md

  frontend:
    name: Web Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: E2E smoke
        run: xvfb-run -a npm run test:e2e
      - name: Build
        run: npm run build
