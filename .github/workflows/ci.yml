name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  engine-native:
    name: Go Engine Native
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine-native
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: apps/engine-native/go.sum

      - name: Test
        run: go test ./...

      - name: Build CLIs
        run: go build ./cmd/archscope-engine ./cmd/archscope-profiler

  desktop-frontend:
    name: Wails Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine-native/cmd/archscope-profiler-app/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/engine-native/cmd/archscope-profiler-app/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
