name: Release

# Triggers on `v*` tags. Builds the Wails desktop binary for darwin/arm64,
# windows/amd64, and linux/amd64; bundles each into the
# platform-native installer (.dmg / NSIS .exe / .deb + .rpm); attaches them
# to a GitHub Release.
#
# Codesign + notarize are gated by repo secrets:
#   APPLE_DEVELOPER_ID                    "Developer ID Application: Your Name (TEAMID)"
#   APPLE_DEVELOPER_ID_CERT_P12           base64-encoded .p12 of the cert
#   APPLE_DEVELOPER_ID_CERT_PASSWORD      password for the .p12
#   APPLE_NOTARY_KEYCHAIN_PROFILE         name of the notarytool profile
#                                         (or use APPLE_ID/TEAM_ID/APP_PASSWORD trio)
#   APPLE_ID / APPLE_TEAM_ID /
#     APPLE_APP_SPECIFIC_PASSWORD         alternate notary auth
#
# When secrets are absent the workflow ad-hoc-signs and skips notarization
# so the release still ships (Gatekeeper will warn but allow open via
# right-click → Open). This makes the workflow useful for early RCs without
# blocking on Apple credentials.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.3.0-rc1) — used when running manually'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Package (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    env:
      HAS_DEV_CERT: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 != '' }}
      HAS_NOTARY_CREDS: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PROFILE != '' || secrets.APPLE_ID != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: darwin-arm64
            arch: arm64
          - os: windows-latest
            label: windows-amd64
            arch: amd64
          - os: ubuntu-latest
            label: linux-amd64
            arch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: apps/engine-native/go.sum

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Validate macOS signing inputs
        if: startsWith(matrix.label, 'darwin-')
        env:
          DEV_ID_PRESENT: ${{ secrets.APPLE_DEVELOPER_ID != '' }}
          CERT_P12_PRESENT: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 != '' }}
          CERT_PASSWORD_PRESENT: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD != '' }}
          KEYCHAIN_PROFILE_PRESENT: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PROFILE != '' }}
          APPLE_ID_PRESENT: ${{ secrets.APPLE_ID != '' }}
          APPLE_TEAM_ID_PRESENT: ${{ secrets.APPLE_TEAM_ID != '' }}
          APPLE_PASSWORD_PRESENT: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          set -euo pipefail

          if [ "$DEV_ID_PRESENT" = "true" ] || [ "$CERT_P12_PRESENT" = "true" ] || [ "$CERT_PASSWORD_PRESENT" = "true" ]; then
            if [ "$DEV_ID_PRESENT" != "true" ] || [ "$CERT_P12_PRESENT" != "true" ] || [ "$CERT_PASSWORD_PRESENT" != "true" ]; then
              echo "::error::macOS Developer ID signing requires APPLE_DEVELOPER_ID, APPLE_DEVELOPER_ID_CERT_P12, and APPLE_DEVELOPER_ID_CERT_PASSWORD together."
              exit 1
            fi
          fi

          if [ "$APPLE_ID_PRESENT" = "true" ] || [ "$APPLE_TEAM_ID_PRESENT" = "true" ] || [ "$APPLE_PASSWORD_PRESENT" = "true" ]; then
            if [ "$APPLE_ID_PRESENT" != "true" ] || [ "$APPLE_TEAM_ID_PRESENT" != "true" ] || [ "$APPLE_PASSWORD_PRESENT" != "true" ]; then
              echo "::error::Apple ID notarization requires APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_SPECIFIC_PASSWORD together."
              exit 1
            fi
          fi

          if [ "$KEYCHAIN_PROFILE_PRESENT" = "true" ] || [ "$APPLE_ID_PRESENT" = "true" ]; then
            if [ "$DEV_ID_PRESENT" != "true" ]; then
              echo "::error::Notarization credentials were provided, but Developer ID signing secrets are incomplete."
              exit 1
            fi
          fi

          if [ "$DEV_ID_PRESENT" = "true" ]; then
            echo "macOS Developer ID signing secrets are configured."
          else
            echo "macOS Developer ID signing secrets are absent; release will use ad-hoc signing and skip notarization."
          fi

      - name: Linux WebKitGTK runtime headers
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev

      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.117

      - name: Install Task runner (macOS / Linux)
        if: matrix.os != 'windows-latest'
        run: |
          curl -sL https://taskfile.dev/install.sh | sh -s -- -d -b /usr/local/bin

      - name: Install Task runner and Windows packaging tools
        if: matrix.os == 'windows-latest'
        run: |
          choco install go-task nsis --no-progress -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Frontend deps
        run: npm ci
        working-directory: apps/engine-native/cmd/archscope-app/frontend

      - name: Wails package
        run: task package
        working-directory: apps/engine-native/cmd/archscope-app

      # ── macOS: codesign with Developer ID if cert is in repo secrets ──
      - name: Import Developer ID certificate (macOS)
        if: startsWith(matrix.label, 'darwin-') && env.HAS_DEV_CERT == 'true'
        env:
          CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/cert.p12

      - name: Codesign (Developer ID)
        if: startsWith(matrix.label, 'darwin-')
        env:
          DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          if [ -n "${DEVELOPER_ID:-}" ]; then
            task darwin:codesign:developer
          else
            echo "APPLE_DEVELOPER_ID secret not set; keeping ad-hoc signature."
          fi
        working-directory: apps/engine-native/cmd/archscope-app

      - name: Notarize
        if: startsWith(matrix.label, 'darwin-')
        env:
          KEYCHAIN_PROFILE: ${{ secrets.APPLE_NOTARY_KEYCHAIN_PROFILE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -n "${KEYCHAIN_PROFILE:-}" ] || [ -n "${APPLE_ID:-}" ]; then
            task darwin:notarize
          else
            echo "Notary credentials absent; skipping notarization."
          fi
        working-directory: apps/engine-native/cmd/archscope-app

      - name: Verify macOS signature and notarization
        if: startsWith(matrix.label, 'darwin-')
        run: |
          set -euo pipefail
          codesign --verify --deep --strict --verbose=2 bin/archscope.app
          if [ "$HAS_NOTARY_CREDS" = "true" ]; then
            xcrun stapler validate bin/archscope.app
          else
            echo "Notarization credentials absent; skipping stapler validation."
          fi
        working-directory: apps/engine-native/cmd/archscope-app

      - name: Build DMG
        if: startsWith(matrix.label, 'darwin-')
        run: task darwin:package:dmg ARCH=${{ matrix.arch }}
        working-directory: apps/engine-native/cmd/archscope-app

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: archscope-${{ matrix.label }}
          path: |
            apps/engine-native/cmd/archscope-app/bin/archscope.app/**
            apps/engine-native/cmd/archscope-app/bin/*.dmg
            apps/engine-native/cmd/archscope-app/bin/*.exe
            apps/engine-native/cmd/archscope-app/bin/archscope
            apps/engine-native/cmd/archscope-app/bin/*.deb
            apps/engine-native/cmd/archscope-app/bin/*.rpm
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Pack per-platform archives
        run: |
          set -euo pipefail
          OUT=release-files
          mkdir -p "$OUT"
          # macOS: ship the .dmg if present, else zip the .app
          for arch in arm64 amd64; do
            DIR="artifacts/archscope-darwin-${arch}"
            if [ -d "$DIR" ]; then
              if ls "$DIR"/*.dmg >/dev/null 2>&1; then
                cp "$DIR"/*.dmg "$OUT/" || true
              fi
              if [ -d "$DIR/archscope.app" ]; then
                ( cd "$DIR" && zip -qr "../../$OUT/archscope-darwin-${arch}.zip" archscope.app )
              fi
            fi
          done
          # Windows: zip exe / nsis output
          if [ -d "artifacts/archscope-windows-amd64" ]; then
            ( cd artifacts/archscope-windows-amd64 && zip -qr "../../$OUT/archscope-windows-amd64.zip" . )
          fi
          # Linux: ship .deb + .rpm individually + tar.gz of the raw binary
          DIR="artifacts/archscope-linux-amd64"
          if [ -d "$DIR" ]; then
            if [ -f "$DIR/archscope" ]; then
              tar -czf "$OUT/archscope-linux-amd64.tar.gz" -C "$DIR" archscope
            fi
            for f in "$DIR"/*.deb "$DIR"/*.rpm; do
              [ -f "$f" ] && cp "$f" "$OUT/" || true
            done
          fi
          ls -lh "$OUT"

      - name: Compute checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS

      - name: Resolve tag name
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.tag.outputs.name, '-rc') || contains(steps.tag.outputs.name, '-alpha') || contains(steps.tag.outputs.name, '-beta') }}
          draft: false
          files: |
            release-files/*
